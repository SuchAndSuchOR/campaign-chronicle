<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign Chronicle</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:,">

</head>

<body>

<!-- AUTH -->

<div id="authSection">

<h1>🎲 Campaign Chronicle</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>

</div>


<!-- MAIN APP -->

<div id="appLayout" class="hidden">

<header>

<h1>Campaign Chronicle</h1>

<button id="settingsBtn">Settings</button>

</header>


<div class="layout">


<!-- CAMPAIGN LIST -->

<div class="sidebar">

<h2>Your Campaigns</h2>

<button id="newCampaignBtn">+ Create Campaign</button>

<div id="campaignList"></div>

</div>


<!-- MAIN CONTENT -->

<div class="content">

<h2 id="campaignTitle">Open a campaign</h2>

<div class="buttons">

<button id="inviteBtn">Invite</button>

<button id="characterBtn">Character Idea</button>

<button id="fireBtn">🔥 Story Idea</button>

</div>

<div id="characterIdea"></div>

<div id="typingIndicator"></div>


<hr>


<h3>Session Notes</h3>

<textarea id="noteText" placeholder="Write session notes..."></textarea>


<hr>


<h3>Campaign Map</h3>

<input type="file" id="mapUpload">

<div id="mapContainer">

<img id="mapImage">

<canvas id="mapCanvas"></canvas>

</div>

<div class="mapTools">

<button id="drawTool">Draw</button>
<button id="tokenTool">Token</button>
<button id="fogTool">Fog</button>
<button id="markerTool">Marker</button>
<button id="clearTool">Clear</button>

</div>


<hr>


<h3>Lore</h3>

<textarea id="loreText" placeholder="World lore, NPCs, cities..."></textarea>

</div>

</div>

</div>


<div id="settingsPanel"></div>


<script type="module" src="./main.js"></script>

</body>
</html>
