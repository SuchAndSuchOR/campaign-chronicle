<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign Chronicle</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:,">

</head>

<body>

<!-- ======================
     AUTH SECTION
====================== -->

<div id="authSection" class="auth-box">

<h1>🎲 Campaign Chronicle</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div class="auth-buttons">
<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>
</div>

</div>


<!-- ======================
     APP LAYOUT
====================== -->

<div id="appLayout" class="hidden">

<header>

<h1>🎲 Campaign Chronicle</h1>

<button id="settingsBtn">⚙ Settings</button>

</header>


<!-- ======================
     MAIN CONTENT
====================== -->

<div class="main-container">


<!-- ===== LEFT PANEL ===== -->

<div class="sidebar">

<h2>Your Campaigns</h2>

<button id="newCampaignBtn">+ Create Campaign</button>

<div id="campaignList"></div>

</div>


<!-- ===== RIGHT PANEL ===== -->

<div class="content">


<h2 id="campaignTitle">Open a Campaign</h2>


<div class="top-buttons">

<button id="inviteBtn">Invite Players</button>

<button id="characterBtn">Character Idea</button>

<button id="fireBtn">🔥 Story Idea</button>

</div>


<div id="characterIdea"></div>

<div id="typingIndicator"></div>


<hr>


<!-- ======================
     NOTES
====================== -->

<h3>Session Notes</h3>

<textarea id="noteText" placeholder="Write session notes..."></textarea>


<hr>


<!-- ======================
     MAP SYSTEM
====================== -->

<h3>Campaign Map</h3>

<input type="file" id="mapUpload">

<br><br>

<img id="mapPreview" style="max-width:100%;">


<hr>


<!-- ======================
     LORE SYSTEM
====================== -->

<h3>Campaign Lore</h3>

<textarea id="loreText" placeholder="Cities, NPCs, factions, history..."></textarea>


</div>

</div>

</div>


<!-- ======================
     SETTINGS PANEL
====================== -->

<div id="settingsPanel" class="hidden"></div>


<!-- ======================
     MAIN SCRIPT
====================== -->

<script type="module" src="./main.js"></script>

</body>
</html>
