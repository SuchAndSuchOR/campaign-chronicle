<!DOCTYPE html>
<html>
<head>
  <title>Campaign Chronicle Pro</title>
  <link rel="stylesheet" href="styles.css">

  <!-- PDF Reader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
</head>
<body>

  <h1>🎲 Campaign Chronicle Pro</h1>

  <!-- HOME -->
  <div id="home">
    <button onclick="createCampaign()">➕ Create Campaign</button>
    <div id="campaignList"></div>
  </div>

  <!-- CAMPAIGN VIEW -->
  <div id="campaignView" class="hidden">
    <button onclick="goHome()">⬅ Back</button>
    <h2 id="campaignTitle"></h2>

    <div class="tabs">
      <button onclick="showSection('notes')">📝 Notes</button>
      <button onclick="showSection('reviews')">👥 Peer Review</button>
      <button onclick="showSection('characters')">🎭 Backstory</button>
      <button onclick="showSection('summarizer')">📄 Summarizer</button>
    </div>

    <div id="notes" class="section"></div>

    <div id="reviews" class="section hidden">
      <h3>Peer Review</h3>
      <textarea id="reviewInput" placeholder="Leave feedback..."></textarea>
      <button onclick="addReview()">Submit Review</button>
      <div id="reviewList"></div>
    </div>

    <div id="characters" class="section hidden">
      <h3>Backstory Helper</h3>
      <button onclick="generateBackstoryPrompt()">🎲 Generate Inspiration</button>
      <div id="backstoryPrompt" class="note-card"></div>
    </div>

    <div id="summarizer" class="section hidden">
      <h3>File Summarizer</h3>
      <input type="file" id="fileInput" accept=".txt,.pdf">
      <button onclick="summarizeFile()">Summarize File</button>
      <div id="summaryOutput" class="note-card"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
